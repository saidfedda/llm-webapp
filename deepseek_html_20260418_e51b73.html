<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 ذكاء اصطناعي متقدم | AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="particles"></div>
    
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="ai-icon">🧠</div>
                <h1>مساعد الذكاء الاصطناعي</h1>
                <div class="status">
                    <span class="status-dot"></span>
                    <span>متصل بالذكاء الاصطناعي</span>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <div class="welcome-icon">✨</div>
                    <h3>مرحباً بك! كيف يمكنني مساعدتك اليوم؟</h3>
                    <p>أنا هنا للإجابة على أسئلتك، مساعدتك في البحث، وحل المشكلات</p>
                    <div class="suggestions">
                        <button class="suggestion-btn">📝 اكتب لي مقالاً</button>
                        <button class="suggestion-btn">💻 ساعدني في كود برمجي</button>
                        <button class="suggestion-btn">🎨 أعطِني أفكاراً إبداعية</button>
                        <button class="suggestion-btn">📚 لخص لي نصاً</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-tools">
                <button class="tool-btn" id="clearChat" title="مسح المحادثة">🗑️</button>
                <button class="tool-btn" id="exportChat" title="تصدير المحادثة">📥</button>
                <label class="tool-btn" for="fileInput" title="رفع ملف">📎</label>
                <input type="file" id="fileInput" style="display: none" accept=".txt,.pdf,.docx">
            </div>
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="اكتب سؤالك هنا... (Shift+Enter للسطر الجديد)" rows="1"></textarea>
                <button id="sendBtn" class="send-btn">
                    <span>إرسال</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="input-info">
                <span>🔒 آمن 100%</span>
                <span>⚡ مدعوم بـ Groq AI</span>
                <span>🎯 دقة عالية</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
