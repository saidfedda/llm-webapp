<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 مساعد AI - نموذجين</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 المساعد الذكي</h1>
            <div class="model-selector">
                <label>اختر النموذج:</label>
                <select id="modelSelect">
                    <option value="llama-3.3-70b-versatile">🚀 قوي (Llama 70B) - دقة عالية</option>
                    <option value="llama-3.1-8b-instant">⚡ سريع (Llama 8B) - سرعة فائقة</option>
                </select>
            </div>
            <div class="api-info">
                <span class="api-badge">⚡ Groq API</span>
                <span class="model-badge" id="currentModelBadge">Llama 70B</span>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message bot">
                <div class="message-content">
                    👋 مرحباً! أنا مساعد ذكي<br>
                    ✅ اختر النموذج المناسب من الأعلى<br>
                    🚀 <strong>القوي</strong> للإجابات المفصلة<br>
                    ⚡ <strong>السريع</strong> للمحادثات العادية<br>
                    💬 ماذا تريد أن تسأل؟
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="اكتب سؤالك هنا...">
            <button id="sendBtn">📤 إرسال</button>
        </div>
        
        <div class="footer">
            <span id="responseTime">⚡ جاهز</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
