<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🤖 Llama AI - نموذجين</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="menu-toggle" id="menuToggle">☰</button>
    
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="logo">
                <span>🧠</span>
                <h2>Llama<span>AI</span></h2>
            </div>
            
            <div class="model-box">
                <p>🎯 اختيار النموذج</p>
                <div class="model-option" data-model="llama-3.3-70b-versatile">
                    <span>🚀</span>
                    <div>
                        <strong>Llama 3.3 70B</strong>
                        <small>قوي ودقيق</small>
                    </div>
                </div>
                <div class="model-option" data-model="llama-3.1-8b-instant">
                    <span>⚡</span>
                    <div>
                        <strong>Llama 3.1 8B</strong>
                        <small>سريع جداً</small>
                    </div>
                </div>
            </div>
            
            <div class="current">
                <span>🟢 النموذج الحالي:</span>
                <strong id="currentModel">Llama 70B</strong>
            </div>
            
            <button id="clearChat">🗑️ مسح المحادثة</button>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <span>⚡ Groq Cloud</span>
                <span id="responseSpeed">جاهز</span>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="welcome">
                    ✨ مرحباً! اختر النموذج وابدأ السؤال
                </div>
            </div>
            
            <div class="input-area">
                <textarea id="userInput" placeholder="اكتب سؤالك..."></textarea>
                <button id="sendBtn">إرسال</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
