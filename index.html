<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 المساعد الذكي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 المساعد الذكي</h1>
            <div class="api-info">
                <span class="api-badge">⚡ Groq API</span>
                <span class="model-badge">Llama 3 70B</span>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message bot">
                <div class="message-content">
                    👋 مرحباً! أنا مساعد ذكي<br>
                    🚀 أستخدم نموذج <strong>Llama 3 70B</strong><br>
                    ✅ اسأل بالعربية أو الإنجليزية<br>
                    💬 ماذا تريد أن تسأل؟
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="اكتب سؤالك هنا...">
            <button id="sendBtn">📤 إرسال</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
